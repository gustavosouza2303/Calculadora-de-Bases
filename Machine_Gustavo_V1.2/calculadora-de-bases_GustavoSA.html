<script>

    function converter() {
        // Decimal
        let inputDecimal = (Number(demo1.value));
        let decimal = parseInt(inputDecimal, 10);

         // Octal
        let inputOctal = Number(demo2.value);
        let octal = parseInt(inputOctal, 8);

        // Hexadecimal
        let inputHexadecimal = Number(demo3.value);
        let hexadecimal = parseInt(inputHexadecimal, 16);

        // Binario
        let inputBinario = Number(demo4.value);
        let binario = parseInt(inputBinario, 2);

        if (decimal != ``) {
            demo1.value = decimal.toString(10);
            demo2.value = decimal.toString(8);
            demo3.value = decimal.toString(16);
            demo4.value = decimal.toString(2);

        } else if (octal != ``) {
            demo1.value = decimal.toString(10);
            demo2.value = decimal.toString(8);
            demo3.value = decimal.toString(16);
            demo4.value = decimal.toString(2);
        } else if (hexadecimal != ``) {
            demo1.value = decimal.toString(10);
            demo2.value = decimal.toString(8);
            demo3.value = decimal.toString(16);
            demo4.value = decimal.toString(2);
        } else if (binario != ``) {
            demo1.value = decimal.toString(10);
            demo2.value = decimal.toString(8);
            demo3.value = decimal.toString(16);
            demo4.value = decimal.toString(2);
        }
    }

function converterCaracter() {

    div_output.innerHTML = '';

    let caractere = input_ascii.value;
    let decimal = caractere.charCodeAt();
    let uni = caractere.charCodeAt(0)
    let format = uni.toString(16).toUpperCase().padStart(4, '0');

    /*
    Sistema UTF-8?

    -- TextEncoder().encode(caractere) = Converte o caractere para UTF-8 em bytes resultando em valores octais em um lista (por ex: [226, 130, 172]).

    -- .map(b => b.toString(16).padStart(2, '0')) = Converte os valores recebidos em hexadecimal.

    -- .join(' ') = transforma o array (lista) em uma string.

    */
    let utf8 = [...new TextEncoder().encode(caractere)]
        .map(b => b.toString(16).padStart(2, '0'))
        .join(' ');

    let utf16 = uni.toString(16).toUpperCase().padStart(4, '0');

    if (caractere == '') {
        div_output.innerHTML = '';
    } else {
        div_output.style.display = 'block';
            
        div_output.innerHTML += `<b>Decimal: </b> ${decimal} <br>`;
        div_output.innerHTML += `<b>Binário: </b> ${decimal.toString(2)} <br>`;
        div_output.innerHTML += `<b>Hexadecimal: </b> ${decimal.toString(16).toUpperCase()}  <br>`;
        div_output.innerHTML += `<b>Unicode: </b> U+${format.toUpperCase()}  <br>`;
        div_output.innerHTML += `<b>UTF-8: </b> ${utf8.toUpperCase()} <br>`;
        div_output.innerHTML += `<b>UTF-16: </b> ${utf16.toUpperCase()} <br>`;
    }
}
